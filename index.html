<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>SmartHMS - Smart Hospital Management System</title>
    <meta name="description" content="Streamline your healthcare operations with SmartHMS. Complete patient management, appointments, prescriptions, pharmacy, and billing in one platform." />
    <meta name="author" content="SmartHMS" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SmartHMS - Smart Hospital Management System" />
    <meta property="og:description" content="Streamline your healthcare operations with SmartHMS. Complete patient management, appointments, prescriptions, pharmacy, and billing in one platform." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SmartHMS - Smart Hospital Management System" />
    <meta name="twitter:description" content="Streamline your healthcare operations with SmartHMS. Complete patient management, appointments, prescriptions, pharmacy, and billing in one platform." />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Disable right-click context menu
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // Block keyboard shortcuts for dev tools
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+I (Dev Tools)
        if (e.ctrlKey && e.shiftKey && e.key === 'I') {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+J (Console)
        if (e.ctrlKey && e.shiftKey && e.key === 'J') {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+C (Inspect Element)
        if (e.ctrlKey && e.shiftKey && e.key === 'C') {
          e.preventDefault();
          return false;
        }
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') {
          e.preventDefault();
          return false;
        }
        // Cmd+Option+I (Mac Dev Tools)
        if (e.metaKey && e.altKey && e.key === 'i') {
          e.preventDefault();
          return false;
        }
        // Cmd+Option+J (Mac Console)
        if (e.metaKey && e.altKey && e.key === 'j') {
          e.preventDefault();
          return false;
        }
        // Cmd+Option+U (Mac View Source)
        if (e.metaKey && e.altKey && e.key === 'u') {
          e.preventDefault();
          return false;
        }
      });

      // Detect dev tools open via debugger
      (function() {
        const devtools = { open: false };
        const threshold = 160;
        setInterval(function() {
          if (window.outerWidth - window.innerWidth > threshold || 
              window.outerHeight - window.innerHeight > threshold) {
            if (!devtools.open) {
              devtools.open = true;
              document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;"><h1>Developer tools are not allowed.</h1></div>';
            }
          } else {
            devtools.open = false;
          }
        }, 500);
      })();
    </script>
  </body>
</html>
